<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=720, initial-scale=1" />
    <title>눈치와 대화 · 눈치 키오스크</title>
    <link rel="stylesheet" href="/lib/fonts/XEIcon-2.2.0/xeicon.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/flowA/A01-avatar.css">
</head>
<body>
<main class="page-bg page-bg--avatar a01">

    <!-- ========================================================
         ① 상단바 (56px) — 뒤로 / 캐릭터명 / 일반주문 전환 / 음소거
         ======================================================== -->
    <header class="a01__topbar fade-up" style="--delay: 0ms;">
        <button class="a01__topbar-back"
                type="button"
                aria-label="처음으로"
                onclick="confirmGoHome()">
            <i class="xi xi-home" aria-hidden="true"></i>
        </button>
        <div class="a01__topbar-title">
            <span class="a01__topbar-status" data-bind="status">
                <span class="a01__topbar-status-dot"></span>
                대화중
            </span>
            <span class="a01__topbar-name">눈치</span>
        </div>
        <div class="a01__topbar-actions">
            <button class="a01__topbar-action a01__topbar-action--switch"
                    type="button"
                    data-action="switch-normal"
                    aria-label="일반 주문으로 전환">
                <i class="xi xi-touch" aria-hidden="true"></i>
                <span>일반 주문</span>
            </button>
            <button class="a01__topbar-action a01__topbar-action--icon"
                    type="button"
                    data-action="toggle-mute"
                    aria-label="소리 끄기/켜기"
                    aria-pressed="false">
                <i class="xi xi-volume-up" aria-hidden="true"></i>
            </button>
        </div>
    </header>

    <!-- ========================================================
         ② 아바타 스테이지 (720px) — 비디오 cross-fade + 말풍선 + 파형
         ======================================================== -->
    <section class="a01__stage fade-up" style="--delay: 80ms;"
             aria-label="눈치 아바타">
        <div class="a01__stage-canvas">
            <!-- 대기 상태 비디오 (기본 노출) -->
            <video class="a01__avatar-video a01__avatar-video--idle is-active"
                   data-avatar="idle"
                   src="/images/avatars/nunchi_listening.mp4"
                   autoplay loop muted playsinline preload="auto"
                   aria-hidden="true"></video>
            <!-- 대화 상태 비디오 (발화 시 cross-fade) -->
            <video class="a01__avatar-video a01__avatar-video--talking"
                   data-avatar="talking"
                   src="/images/avatars/nuchi_speaking.mp4"
                   loop muted playsinline preload="auto"
                   aria-hidden="true"></video>

            <!-- 음성 파형 (talking 시 표시) -->
            <div class="a01__waveform" data-waveform aria-hidden="true">
                <span class="a01__waveform-bar"></span>
                <span class="a01__waveform-bar"></span>
                <span class="a01__waveform-bar"></span>
                <span class="a01__waveform-bar"></span>
                <span class="a01__waveform-bar"></span>
                <span class="a01__waveform-bar"></span>
                <span class="a01__waveform-bar"></span>
            </div>
        </div>

        <!-- 말풍선 (현재 발화) -->
        <div class="a01__bubble glass-card glass-card--heavy" data-bubble role="status" aria-live="polite">
            <span class="a01__bubble-text" data-bubble-text></span>
            <span class="a01__bubble-cursor" data-bubble-cursor aria-hidden="true">|</span>
            <!-- 생각중 점점점(…) 인디케이터 — .is-thinking 시 노출 -->
            <span class="a01__bubble-dots" data-bubble-dots aria-hidden="true">
                <span></span><span></span><span></span>
            </span>
        </div>
    </section>

    <!-- ========================================================
         ③ 미니 카트 + 빠른응답 칩 (220px) — 카드형 카트 + 수량 조절
         ======================================================== -->
    <section class="a01__quickbar fade-up" style="--delay: 320ms;">
        <!-- 미니 카트 -->
        <div class="a01__minicart" data-minicart>
            <!-- 빈 상태 -->
            <div class="a01__minicart-empty" data-minicart-empty>
                <i class="xi xi-cart" aria-hidden="true"></i>
                <span>아직 담은 메뉴가 없어요</span>
            </div>

            <!-- 채워진 상태 -->
            <div class="a01__minicart-filled" data-minicart-filled hidden>
                <div class="a01__minicart-head">
                    <div class="a01__minicart-head-left">
                        <i class="xi xi-cart" aria-hidden="true"></i>
                        <span>장바구니</span>
                        <span class="a01__minicart-count" data-minicart-count>0</span>
                    </div>
                    <div class="a01__minicart-head-right">
                        <span class="a01__minicart-total-label">합계</span>
                        <span class="a01__minicart-total-value" data-minicart-total>₩ 0</span>
                    </div>
                </div>
                <ul class="a01__minicart-track" data-minicart-list>
                    <!-- JS 동적 — 카드형 항목 -->
                </ul>
            </div>
        </div>

        <!-- 빠른응답 칩 -->
        <div class="a01__chip-row" data-chip-row aria-label="빠른 응답">
            <!-- JS 동적 -->
        </div>
    </section>

    <!-- ========================================================
         ④ 입력 바 (120px) — 텍스트 입력 + 큰 마이크 버튼
         ======================================================== -->
    <section class="a01__inputbar fade-up" style="--delay: 400ms;">
        <div class="a01__input-wrap">
            <input class="a01__input"
                   type="text"
                   data-input
                   placeholder="눈치에게 말하거나 입력해보세요"
                   autocomplete="off"
                   aria-label="눈치에게 메시지 입력" />
            <button class="a01__input-send"
                    type="button"
                    data-action="send"
                    aria-label="보내기">
                <i class="xi xi-send" aria-hidden="true"></i>
            </button>
        </div>
        <button class="a01__btn-mic"
                type="button"
                data-action="toggle-mic"
                aria-label="음성 입력 시작/중지"
                aria-pressed="false">
            <span class="a01__btn-mic-ripple"></span>
            <span class="a01__btn-mic-ripple"></span>
            <span class="a01__btn-mic-ripple"></span>
            <i class="xi xi-microphone a01__btn-mic-icon" aria-hidden="true"></i>
        </button>
    </section>

    <!-- ========================================================
         ⑤ 대화 보기 FAB (오른쪽 하단, 원형) — 탭 시 대화 기록 서랍 열기
         ======================================================== -->
    <button class="a01__fab"
            type="button"
            data-action="open-drawer"
            aria-label="대화 기록 보기">
        <i class="xi xi-comment a01__fab-icon" aria-hidden="true"></i>
    </button>

    <!-- ========================================================
         ⑥ 대화 기록 — 가운데 카드 모달 (평소엔 닫힘, FAB 로 열기)
         ======================================================== -->
    <div class="a01__drawer" data-drawer hidden>
        <div class="a01__drawer-backdrop" data-drawer-close aria-hidden="true"></div>
        <aside class="a01__drawer-panel"
               role="dialog"
               aria-modal="true"
               aria-label="대화 기록">
            <div class="a01__drawer-head">
                <span class="a01__drawer-title">
                    <i class="xi xi-comment" aria-hidden="true"></i> 대화 기록
                </span>
                <button class="a01__drawer-close"
                        type="button"
                        data-drawer-close
                        aria-label="닫기">
                    <i class="xi xi-close" aria-hidden="true"></i>
                </button>
            </div>
            <section class="a01__log" data-log aria-live="polite">
                <!-- JS 동적 — appendLog() 가 메시지 append -->
            </section>
        </aside>
    </div>

</main>

<script src="/js/common/kiosk-guard.js"></script>
<script src="/lib/jquery-3.7.0.min.js"></script>
<script src="/js/common/confirm-modal.js"></script>
<script src="/js/common/app-state.js"></script>
<script src="/js/common/sse-parser.js"></script>
<script src="/js/common/api.js"></script>
<script src="/js/common/ai-action.js"></script>
<script src="/js/flowA/reply-keywords.js"></script>
<script src="/js/flowA/recommend-sheet.js"></script>
<script src="/js/flowA/option-sheet.js"></script>
<script src="/js/flowA/conversation-engine.js"></script>
<script src="/js/flowA/A01-avatar.js"></script>
</body>
</html>
