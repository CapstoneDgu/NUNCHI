<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUNCHI 주문 관리</title>
    <link rel="stylesheet" href="/css/admin/admin.css" />
</head>
<body class="admin-body">
<header class="admin-header">
    <div>
        <h1>NUNCHI 주문 관리</h1>
        <p>키오스크 주문 내역과 주문 상태를 관리합니다.</p>
    </div>
    <div class="header-actions">
        <a href="/admin/dashboard.html" class="secondary-link">대시보드</a>
        <a href="/admin/menus.html" class="secondary-link">메뉴 관리</a>
        <a href="/admin/recommendations.html" class="secondary-link">추천 관리</a>
        <button id="logoutButton" class="logout-button">로그아웃</button>
    </div>
</header>

<main class="admin-main">
    <section class="admin-section">
        <div class="section-title-row">
            <h2>주문 목록</h2>
            <button id="refreshOrderButton" class="secondary-button">새로고침</button>
        </div>

        <div id="orderError" class="error-message"></div>
        <div id="orderLoading" class="loading-text">주문 목록을 불러오는 중입니다...</div>

        <div class="table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>주문 ID</th>
                    <th>세션 ID</th>
                    <th>총 금액</th>
                    <th>상태</th>
                    <th>상품 수</th>
                    <th>주문 시간</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody id="orderTableBody">
                <tr>
                    <td colspan="7" class="empty-cell">주문이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section id="orderDetailSection" class="admin-section hidden">
        <div class="section-title-row">
            <h2 id="orderDetailTitle">주문 상세</h2>
            <button id="closeDetailButton" class="secondary-button">닫기</button>
        </div>

        <div id="orderDetailError" class="error-message"></div>

        <div class="detail-grid">
            <div class="detail-card">
                <span>주문 ID</span>
                <strong id="detailOrderId">-</strong>
            </div>
            <div class="detail-card">
                <span>세션 ID</span>
                <strong id="detailSessionId">-</strong>
            </div>
            <div class="detail-card">
                <span>총 금액</span>
                <strong id="detailTotalAmount">-</strong>
            </div>
            <div class="detail-card">
                <span>주문 시간</span>
                <strong id="detailCreatedAt">-</strong>
            </div>
        </div>

        <div class="status-edit-row">
            <label for="orderStatusSelect">주문 상태</label>
            <select id="orderStatusSelect">
                <option value="PENDING">PENDING</option>
                <option value="COMPLETED">COMPLETED</option>
                <option value="CANCELLED">CANCELLED</option>
            </select>
            <button id="updateStatusButton" class="primary-button">상태 변경</button>
        </div>

        <h3 class="sub-title">주문 상품</h3>
        <div class="table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>상품 ID</th>
                    <th>메뉴 ID</th>
                    <th>메뉴명</th>
                    <th>수량</th>
                    <th>단가</th>
                    <th>상품 총액</th>
                </tr>
                </thead>
                <tbody id="orderItemTableBody">
                <tr>
                    <td colspan="6" class="empty-cell">주문 상품이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="/js/admin/admin-api.js"></script>
<script src="/js/admin/admin-order.js"></script>
</body>
</html>
