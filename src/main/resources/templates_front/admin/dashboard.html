<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUNCHI 관리자페이지</title>
    <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="admin-body">
<header class="admin-header">
    <div>
        <h1>NUNCHI 관리자페이지</h1>
        <p>메뉴, 주문, 추천 현황을 관리합니다.</p>
    </div>
    <button id="logoutButton" class="logout-button">로그아웃</button>
</header>

<main class="admin-main">
    <section class="admin-section">
        <div class="section-title-row">
            <h2>대시보드</h2>
            <button id="refreshDashboardButton" class="secondary-button">새로고침</button>
        </div>

        <div id="dashboardLoading" class="loading-text">대시보드 정보를 불러오는 중입니다...</div>
        <div id="dashboardError" class="error-message"></div>

        <div id="dashboardContent" class="dashboard-grid hidden">
            <div class="dashboard-card">
                <span class="card-label">오늘 주문 수</span>
                <strong id="todayOrderCount">0</strong>
            </div>

            <div class="dashboard-card">
                <span class="card-label">오늘 매출</span>
                <strong id="todaySalesAmount">0원</strong>
            </div>

            <div class="dashboard-card">
                <span class="card-label">전체 주문 수</span>
                <strong id="totalOrderCount">0</strong>
            </div>

            <div class="dashboard-card">
                <span class="card-label">품절 메뉴 수</span>
                <strong id="soldOutMenuCount">0</strong>
            </div>

            <div class="dashboard-card">
                <span class="card-label">추천 메뉴 수</span>
                <strong id="recommendedMenuCount">0</strong>
            </div>
        </div>
    </section>

    <section class="admin-section">
        <h2>최근 주문</h2>
        <div class="table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>주문 ID</th>
                    <th>세션 ID</th>
                    <th>금액</th>
                    <th>상태</th>
                    <th>상품 수</th>
                    <th>주문 시간</th>
                </tr>
                </thead>
                <tbody id="recentOrdersBody">
                <tr>
                    <td colspan="6" class="empty-cell">최근 주문이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="admin-section">
        <h2>관리 메뉴</h2>
        <div class="admin-menu-links">
            <a href="/admin/menus.html">메뉴 관리</a>
            <a href="/admin/orders.html">주문 관리</a>
            <a href="#" class="disabled-link">추천 관리</a>
        </div>
        <p class="hint-text">다음 단계에서 메뉴/주문/추천 관리 화면을 연결합니다.</p>
    </section>
</main>

<script src="/js/admin-api.js"></script>
<script src="/js/admin-dashboard.js"></script>
</body>
</html>
