<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=720, initial-scale=1">
    <title>결제 수단 선택 · 눈치 키오스크</title>

    <link rel="stylesheet" href="/lib/fonts/XEIcon-2.2.0/xeicon.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/flowP/P02-payment.css">
    <link rel="stylesheet" href="/css/common/payment-modal.css">
    <!-- 결제 모달 진행 애니메이션(IC/정맥/바코드) — 기존 결제 화면 비주얼 재사용 (QA R3) -->
    <link rel="stylesheet" href="/css/flowP/P03-vein.css">
    <link rel="stylesheet" href="/css/flowP/P04-processing.css">
    <link rel="stylesheet" href="/css/flowP/P07-barcode.css">
</head>
<body>
<main class="page-bg">

    <!-- 상단바 -->
    <header class="p-topbar">
        <button type="button" class="p-topbar__back vision-selectable" data-action="nav-back" aria-label="뒤로">
            <i class="xi-angle-left-thin" aria-hidden="true"></i>
        </button>
        <div class="p-topbar__titles">
            <span class="p-topbar__eyebrow" data-bind="storeName">상록원</span>
            <h1 class="p-topbar__title">결제 수단 선택</h1>
        </div>
        <div class="p-topbar__actions">
            <button class="app-topbar__action-icon" type="button"
                    data-action="open-chat"
                    aria-label="대화 보기">
                <i class="xi xi-comment" aria-hidden="true"></i>
            </button>
            <button class="p-topbar__mic app-topbar__action-icon" type="button"
                    data-action="toggle-mic"
                    aria-label="마이크 토글">
                <i class="xi xi-microphone" aria-hidden="true"></i>
            </button>
        </div>
    </header>

    <!-- 3-step 진행 표시 -->
    <ol class="step-indicator" aria-label="결제 단계" style="--steps: 3;">
        <li class="step-indicator__item" data-state="done">
            <span class="step-indicator__dot" aria-hidden="true">
                <i class="xi-check-min"></i>
            </span>
            <span class="step-indicator__label">주문 확인</span>
        </li>
        <li class="step-indicator__item" data-state="active">
            <span class="step-indicator__dot" aria-hidden="true">2</span>
            <span class="step-indicator__label">결제 수단</span>
        </li>
        <li class="step-indicator__item" data-state="pending">
            <span class="step-indicator__dot" aria-hidden="true">3</span>
            <span class="step-indicator__label">결제</span>
        </li>
    </ol>

    <!-- 본문 -->
    <section class="p02" aria-label="결제 수단 선택">

        <!-- 결제 금액 요약 카드 -->
        <div class="p02__amount-card">
            <div class="p02__amount-row">
                <span class="p02__amount-label">총 결제 금액</span>
                <span class="p02__amount-count" data-bind="count">0개</span>
            </div>
            <strong class="p02__amount-price" data-bind="total">₩0</strong>
        </div>

        <!-- 섹션 안내 -->
        <h2 class="p02__heading">결제를 진행해 주세요</h2>
        <p class="p02__subheading">카드(IC·마그네틱)로 결제합니다</p>

        <!-- 카드 결제 안내 (IC 꽂기 + 마그네틱 긁기 통합) -->
        <div class="p02__pay-info">
            <span class="p02__pay-info-icon" aria-hidden="true"><i class="xi-credit-card"></i></span>
            <div class="p02__pay-info-text">
                <strong class="p02__pay-info-title">카드 결제</strong>
                <span class="p02__pay-info-desc">신용·체크카드를 꽂거나 긁어 결제합니다</span>
            </div>
        </div>

        <!-- 힌트 영역 -->
        <div class="p02__hint" data-bind="hint">
            <i class="xi-info-o" aria-hidden="true"></i>
            <span>‘결제하기’를 누르면 카드 결제가 시작됩니다</span>
        </div>

    </section>

    <!-- 하단 CTA -->
    <footer class="p02__cta-wrap">
        <button type="button"
                class="p-cta p-cta--primary p-cta--block p02__cta vision-selectable"
                data-vision-default
                data-action="next">
            결제하기
        </button>
    </footer>
</main>

<script src="/js/common/kiosk-guard.js"></script>
<script src="/js/common/app-state.js"></script>
<script src="/js/common/api-client.js"></script>
<script src="/js/common/api.js"></script>
<script src="/js/common/avatar-voice-guide.js"></script>
<script src="/js/common/confirm-modal.js"></script>
<script src="/js/common/quick-action.js"></script>
<script src="/js/common/ai-action.js"></script>
<script src="/js/flowA/conversation-engine.js"></script>
<script src="/js/common/voice-controller.js"></script>
<script src="/js/common/card-terminal.js"></script>
<script src="/js/vision-client.js"></script>
<script src="/js/common/payment-modal.js"></script>
<script src="/js/flowP/P02-payment.js" defer></script>
</body>
</html>
