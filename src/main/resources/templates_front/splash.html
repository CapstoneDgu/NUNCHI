<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=720, initial-scale=1" />
    <title>상록원 - 학생식당</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/splash.css">
</head>
<body>
<main class="splash">
    <!-- 동국대 로고 -->
    <img class="splash__logo" src="/images/common/dongguk-logo.svg" alt="동국대학교">

    <!-- 매장 타이틀 -->
    <header class="splash__title">
        <span class="splash__title-sub">학생식당</span>
        <span class="splash__title-main">상록원</span>
    </header>

    <!-- 인기 메뉴 카드 섹션 -->
    <section class="splash__featured" aria-label="인기 메뉴">
        <article class="splash__card">
            <div class="splash__card-image" role="img" aria-label="숯불삼겹솥밥 이미지">
                <div class="splash__card-overlay" aria-hidden="true"></div>

                <div class="splash__card-badge" aria-label="지금 인기 메뉴">
                    <span aria-hidden="true">⏰</span>
                    <span>지금 인기</span>
                </div>

                <div class="splash__card-title-block">
                    <span class="splash__card-title">숯불삼겹솥밥</span>
                    <span class="splash__card-price">₩5,000</span>
                </div>
            </div>

            <div class="splash__card-stats">
                <div class="splash__card-stats-row">
                    <div class="splash__card-stats-info">
                        <span class="splash__card-stats-label">현재 시간대 주문 1위</span>
                        <span class="splash__card-stats-desc">점심 피크 12:00–13:00 최다 주문</span>
                    </div>
                    <span class="splash__card-stats-value">81%</span>
                </div>

                <div class="splash__card-progress"
                     role="progressbar"
                     aria-valuenow="81"
                     aria-valuemin="0"
                     aria-valuemax="100"
                     aria-label="주문 비율 81%">
                    <div class="splash__card-progress-fill"></div>
                </div>
            </div>
        </article>

        <div class="splash__indicators" role="tablist" aria-label="카드 슬라이드 인디케이터">
            <div class="splash__indicator" role="tab" aria-selected="false" aria-label="슬라이드 1"></div>
            <div class="splash__indicator splash__indicator--active" role="tab" aria-selected="true" aria-label="슬라이드 2"></div>
            <div class="splash__indicator" role="tab" aria-selected="false" aria-label="슬라이드 3"></div>
            <div class="splash__indicator" role="tab" aria-selected="false" aria-label="슬라이드 4"></div>
        </div>
    </section>

    <!-- 주문하기 버튼 -->
    <button class="splash__order-btn" type="button" aria-label="주문하기">주문하기</button>

    <!-- 화면 터치 힌트 -->
    <div class="splash__hint" aria-hidden="true">
        <span class="splash__hint-arrow">↑</span>
        <span class="splash__hint-text">화면을 터치하세요</span>
    </div>

    <!-- Team Nunchi 라벨 -->
    <button class="splash__design-btn" type="button" aria-label="Team Nunchi">🎨 Team Nunchi</button>

    <!-- 도움말 버튼 — partial 주입 -->
    <div data-include="/layouts/_help-button.html"></div>
</main>

<script type="module" src="/js/common/partials-loader.js"></script>
</body>
</html>
