spring:
  config:
    activate:
      on-profile: local
    import: optional:file:./.env[.properties]

  application:
    name: NUNCHI

  web:
    resources:
      static-locations:
        - classpath:/static/front/
        - classpath:/templates_front/

  datasource:
    url: ${LOCAL_DB_URL:jdbc:postgresql://127.0.0.1:5433/nunchi}
    username: ${LOCAL_DB_USERNAME:nunchi}
    password: ${LOCAL_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        sslmode: disable

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

google:
  cloud:
    apiKey: ${GOOGLE_CLOUD_API_KEY:dummy-google-api-key}
    tts:
      language-code: ko-KR
      voice-name: ko-KR-Chirp3-HD-Pulcherrima
      ssml-gender: FEMALE
      audio-encoding: MP3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

fastapi:
  base-url: ${LOCAL_FASTAPI_URL}

admin:
  password: ${ADMIN_PASSWORD}

jwt:
  secret: ${JWT_SECRET:your-very-long-secret-key-your-very-long-secret-key}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}