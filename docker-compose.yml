version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: nunchi-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nunchi-redis
    restart: always
    ports:
      - "6379:6379"

  app:
    image: ${ECR_IMAGE}
    container_name: nunchi-app
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DEV_DB_URL: ${DEV_DB_URL}
      DEV_DB_USERNAME: ${DEV_DB_USERNAME}
      DEV_DB_PASSWORD: ${DEV_DB_PASSWORD}
      DEV_REDIS_HOST: redis
      DEV_REDIS_PORT: 6379
      DEV_FASTAPI_URL: ${DEV_FASTAPI_URL}
    ports:
      - "8080:8080"

volumes:
  postgres_data: