name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_IMAGE: ${{ steps.build-image.outputs.image }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_IMAGE,ECR_REGISTRY,AWS_REGION
          script: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
            cd /home/ubuntu/nunchi
            export ECR_IMAGE=$ECR_IMAGE
            docker compose pull app
            docker compose down
            docker compose up -d

  notify-discord:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 배포 결과 디스코드 알림 전송
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ needs.deploy.result }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.deploy.outputs.image-tag }}
        run: |
          if [ "$STATUS" = "success" ]; then
            message="✅ 배포 성공"
            color=3066993
          else
            message="❌ 배포 실패"
            color=15158332
          fi

          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "🚀 백엔드 서버 배포 알림",
              "description": "**커밋 메시지**: $COMMIT_MESSAGE\n**작성자**: $AUTHOR\n**결과**: ${message}",
              "color": ${color},
              "fields": [
                {
                  "name": "🏷️ 이미지 태그",
                  "value": "\`latest\`",
                  "inline": true
                },
                {
                  "name": "🌿 브랜치",
                  "value": "main",
                  "inline": true
                },
                {
                  "name": "🔗 커밋 링크",
                  "value": "[확인하기](https://github.com/${{ github.repository }}/commit/$IMAGE_TAG)"
                }
              ],
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )

          curl -H "Content-Type: application/json" \
             -X POST \
             -d "$payload" \
             "$DISCORD_WEBHOOK"

          echo "📢 디스코드 알림 전송 완료"
